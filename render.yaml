services:
  - type: worker
    name: mossy-4x
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m src.main"
    envVars:
      - key: MODE
        value: demo
      - key: OANDA_ENV
        value: practice
      - key: TZ
        value: Australia/Perth
      - key: HEARTBEAT_SECONDS
        value: "30"
      - key: DECISION_SECONDS
        value: "60"
      - key: SESSION_MODE
        value: "ALWAYS"
      - key: AGGRESSIVE_MODE
        value: "true"
      - key: AGGRESSIVE_RISK_PCT
        value: "0.004"
      - key: AGGRESSIVE_MAX_POSITIONS
        value: "3"
      - key: AGGRESSIVE_COOLDOWN_CANDLES
        value: "2"
      - key: AGGRESSIVE_DAILY_LOSS_CAP_PCT
        value: "0.02"
      - key: AGGRESSIVE_WEEKLY_LOSS_CAP_PCT
        value: "0.05"
      - key: AGGRESSIVE_MAX_DRAWDOWN_CAP_PCT
        value: "0.15"
      - key: OANDA_API_KEY
        sync: false
      - key: INSTRUMENTS
        value: "AUD_USD,GBP_USD"
      - key: MERGE_DEFAULT_INSTRUMENTS
        value: "false"
      - key: ENABLE_RISK_CAP
        value: "true"
      - key: MAX_RISK_PER_TRADE_CAP_PCT
        value: "1.0"
      - key: ALLOW_HIGH_RISK
        value: "false"
      - key: RESET_WEEKLY_LOSS_CAP
        value: "false"
      - key: OANDA_ACCOUNT_ID
        sync: false
# ---------- MCP SERVICES ----------
  - type: web
    name: mcp-web
    env: docker
    plan: free
    dockerfilePath: mcp/Dockerfile
    autoDeploy: true
    envVars:
      - key: MCP_API_KEY
        sync: false
      - key: GH_PAT
        sync: false
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false

  
  - type: cron
    name: mcp-optimiser
    env: docker
    plan: starter
    dockerfilePath: mcp/Dockerfile
    command: >
      python optimiser.py && python patcher.py
    schedule: "0 1 * * *"
    envVars:
      - key: MCP_API_KEY
        sync: false
      - key: GH_PAT
        sync: false
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false

        
  
