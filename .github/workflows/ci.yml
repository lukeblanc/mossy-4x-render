name: CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q --upgrade pip && pip install -q -r requirements.txt

      - name: Compile source
        run: python -m compileall -q app src tests

      - name: Run tests
        id: pytest
        continue-on-error: true
        env:
          MODE: simulation
          OANDA_ENV: practice
        run: |
          pytest -q --disable-warnings --maxfail=10 > pytest-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce pytest result
        if: always()
        run: |
          cat pytest-output.txt
          test "${{ steps.pytest.outputs.exit_code }}" = "0"
