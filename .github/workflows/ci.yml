name: CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall -q app src tests

      - name: Run tests
        env:
          MOSSY_SAFE_DEMO_PROFILE: "false"
          MODE: simulation
          OANDA_ENV: practice
        run: pytest -q
