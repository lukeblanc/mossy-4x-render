name: CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Apply one-time regression fixes
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/self-improving-demo'
        run: |
          python scripts/apply_ci_regression_fixes.py
          if ! git diff --quiet -- src/main.py src/trade_journal.py; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/main.py src/trade_journal.py
            git commit -m "Fix decision-cycle and report regressions"
            git push origin HEAD:agent/self-improving-demo
          fi

      - name: Install dependencies
        run: python -m pip install -q --upgrade pip && pip install -q -r requirements.txt

      - name: Compile source
        run: python -m compileall -q app src tests

      - name: Run tests
        id: pytest
        continue-on-error: true
        env:
          MODE: simulation
          OANDA_ENV: practice
        run: |
          pytest -q --disable-warnings --maxfail=10 > pytest-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Upload source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            src
            app
            tests
            render.yaml
            requirements.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce pytest result
        if: always()
        run: |
          cat pytest-output.txt
          test "${{ steps.pytest.outputs.exit_code }}" = "0"
